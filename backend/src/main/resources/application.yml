server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: smart-note
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartnote}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
          ssl:
            enable: ${MAIL_SMTP_SSL_ENABLE:false}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s
      
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat

smartnote:
  export:
    pdf-font-path: ${SMARTNOTE_EXPORT_PDF_FONT_PATH:}
    pdf-font-resource: ${SMARTNOTE_EXPORT_PDF_FONT_RESOURCE:}
  auth:
    register-code:
      expire-minutes: ${SMARTNOTE_REGISTER_CODE_EXPIRE_MINUTES:10}
      resend-seconds: ${SMARTNOTE_REGISTER_CODE_RESEND_SECONDS:60}
      subject: ${SMARTNOTE_REGISTER_CODE_SUBJECT:SmartNote 注册验证码}
