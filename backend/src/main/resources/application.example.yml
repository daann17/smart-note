server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: smart-note
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/smartnote}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterAccess=600s

  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: deepseek-chat

smartnote:
  export:
    pdf-font-path: ${SMARTNOTE_EXPORT_PDF_FONT_PATH:}
    pdf-font-resource: ${SMARTNOTE_EXPORT_PDF_FONT_RESOURCE:}
